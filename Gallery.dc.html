<x-dc>
<helmet>
<title>Gallery | Heera Homes — Tiles &amp; Sanitaryware, Chhindwara</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{--terracotta:#8B3A2F;--slate:#2E3A34;--gold:#D9A441;--bg:#FAF7F2;--surface:#FFFFFF;--text:#2A2621;--muted:#6B6259;--btn-hover:#6E2E25;}
*{box-sizing:border-box;}html{scroll-behavior:smooth;}body{margin:0;background:var(--bg);color:var(--text);}
a{color:var(--terracotta);}a:hover{color:var(--btn-hover);}
.hh-galgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));grid-auto-rows:150px;gap:12px;}
.hh-tall{grid-row:span 2;}
@media(max-width:640px){.hh-galgrid{grid-template-columns:repeat(2,1fr);grid-auto-rows:130px;gap:10px;}}
@media(prefers-reduced-motion:reduce){html{scroll-behavior:auto;}*{transition:none!important;animation:none!important;}}
</style>
</helmet>

<div ref="{{ lbRef }}" style="position:fixed;inset:0;z-index:300;background:rgba(16,12,9,.92);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s ease;padding:24px;">

  <button aria-label="Previous" onClick="{{ prev }}" style="position:absolute;left:18px;top:50%;transform:translateY(-50%);width:50px;height:50px;border-radius:50%;border:none;background:rgba(255,255,255,.14);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
  <button aria-label="Next" onClick="{{ next }}" style="position:absolute;right:18px;top:50%;transform:translateY(-50%);width:50px;height:50px;border-radius:50%;border:none;background:rgba(255,255,255,.14);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>

    <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
    <span style="font-family:Inter,sans-serif;font-size:15px;">This slot is empty — drop a photo into the tile to preview it here.</span>
  </div>

<dc-import name="Footer" hint-size="100%,460px"></dc-import>

<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  constructor(p){ super(p); ['lbRef','lbImgRef','lbEmptyRef','lbCounterRef'].forEach(r=>this[r]=React.createRef()); this._i=0; }
  _slotSrc(tile){
    const s=tile.querySelector('image-slot');
    if(!s||!s.shadowRoot) return null;
    const im=s.shadowRoot.querySelector('[part=image]');
    if(im && im.getAttribute('src') && im.style.display!=='none') return im.getAttribute('src');
    return null;
  }
  _visible(){ return this._tiles.filter(t=>t.style.display!=='none'); }
  _render(i){
    const vis=this._visible(); if(!vis.length) return;
    this._i=(i+vis.length)%vis.length;
    const src=this._slotSrc(vis[this._i]);
    const img=this.lbImgRef.current, empty=this.lbEmptyRef.current, ctr=this.lbCounterRef.current;
    img.style.opacity='0';
    setTimeout(()=>{
      if(src){ img.src=src; img.style.display='block'; empty.style.display='none'; }
      else { img.style.display='none'; img.removeAttribute('src'); empty.style.display='flex'; }
      img.style.opacity='1';
    }, this._reduced?0:170);
    ctr.textContent=(this._i+1)+' / '+vis.length;
  }
  _open(tile){
    const vis=this._visible(); const idx=vis.indexOf(tile); if(idx<0) return;
    this.lbRef.current.style.opacity='1'; this.lbRef.current.style.pointerEvents='auto';
    document.body.style.overflow='hidden';
    this._render(idx);
  }
  componentDidMount(){
    this._reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
    const els=[...document.querySelectorAll('[data-reveal]')];
    if(this._reduced){ els.forEach(e=>{e.style.opacity='1';e.style.transform='none';}); }
    else {
      const io=new IntersectionObserver((ents)=>{ents.forEach(en=>{if(en.isIntersecting){en.target.style.opacity='1';en.target.style.transform='none';io.unobserve(en.target);}})},{threshold:0.08});
      els.forEach(e=>io.observe(e));
    }
    this._tiles=[...document.querySelectorAll('[data-gtile]')];
    this._tiles.forEach(tile=>{
      tile.addEventListener('mouseenter',()=>{ const b=tile.querySelector('[data-zoom]'); if(b) b.style.opacity='1'; });
      tile.addEventListener('mouseleave',()=>{ const b=tile.querySelector('[data-zoom]'); if(b) b.style.opacity='0'; });
      const zb=tile.querySelector('[data-zoom]');
      if(zb) zb.addEventListener('click',(e)=>{ e.stopPropagation(); this._open(tile); });
    });
    // filter
    const pills=[...document.querySelectorAll('[data-gfilter]')];
    pills.forEach(btn=>btn.addEventListener('click',()=>{
      const f=btn.dataset.gfilter;
      pills.forEach(p=>{ const on=p===btn; p.style.background=on?'var(--terracotta)':'#fff'; p.style.color=on?'#fff':'var(--slate)'; p.style.borderColor=on?'var(--terracotta)':'rgba(42,38,33,.16)'; });
      this._tiles.forEach(t=>{ t.style.display=(f==='all'||t.dataset.gcat===f)?'':'none'; });
    }));
    // keyboard
    this._onKey=(e)=>{
      if(this.lbRef.current.style.opacity!=='1') return;
      if(e.key==='Escape') this._close();
      else if(e.key==='ArrowLeft') this._render(this._i-1);
      else if(e.key==='ArrowRight') this._render(this._i+1);
    };
    window.addEventListener('keydown', this._onKey);
  }
  componentWillUnmount(){ window.removeEventListener('keydown', this._onKey); }
  _close(){ this.lbRef.current.style.opacity='0'; this.lbRef.current.style.pointerEvents='none'; document.body.style.overflow=''; }
  renderVals(){
    return {
      lbRef:this.lbRef, lbImgRef:this.lbImgRef, lbEmptyRef:this.lbEmptyRef, lbCounterRef:this.lbCounterRef,
      close:()=>this._close(),
      prev:()=>this._render(this._i-1),
      next:()=>this._render(this._i+1),
    };
  }
}
</script>
