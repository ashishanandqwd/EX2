<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>:root{--terracotta:#8B3A2F;--slate:#2E3A34;--gold:#D9A441;--bg:#FAF7F2;--surface:#FFFFFF;--text:#2A2621;--muted:#6B6259;}*{box-sizing:border-box;}@media(prefers-reduced-motion:reduce){*{transition:none!important;}}</style>
</helmet>
<article style="background:var(--surface);border:1px solid rgba(42,38,33,.07);border-radius:16px;padding:28px;display:flex;flex-direction:column;gap:16px;box-shadow:0 2px 12px rgba(42,38,33,.04);height:100%;">
  <div style="display:flex;align-items:center;justify-content:space-between;">
    <div style="display:flex;gap:3px;" aria-label="{{ rating }} out of 5 stars">
      <sc-for list="{{ stars }}" as="on" hint-placeholder-count="5">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="{{ on }}"><path d="M12 2l2.9 6.3 6.9.7-5.2 4.6 1.5 6.8L12 17.8 5.9 20.4l1.5-6.8L2.2 9l6.9-.7z"/></svg>
      </sc-for>
    </div>
    <svg width="26" height="26" viewBox="0 0 24 24" aria-hidden="true"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.99.66-2.26 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23z" fill="#34A853"/><path d="M5.84 14.1a6.6 6.6 0 0 1 0-4.2V7.06H2.18a11 11 0 0 0 0 9.88z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06L5.84 9.9C6.71 7.3 9.14 5.38 12 5.38z" fill="#EA4335"/></svg>
  </div>
  <p data-editable="review" style="margin:0;font-family:Fraunces,serif;font-weight:400;font-size:clamp(16px,1.6vw,18px);line-height:1.55;color:var(--text);flex:1;">“{{ text }}”</p>
  <div style="display:flex;align-items:center;gap:12px;padding-top:4px;border-top:1px solid rgba(42,38,33,.07);">
    <div ref="{{ avatarRef }}" style="width:42px;height:42px;border-radius:50%;background:var(--terracotta);color:#fff;font-family:Fraunces,serif;font-weight:600;font-size:17px;display:flex;align-items:center;justify-content:center;">{{ initial }}</div>
    <div style="line-height:1.3;">
      <div data-editable="name" style="font-family:Inter,sans-serif;font-weight:600;font-size:14.5px;color:var(--text);">{{ name }}</div>
      <div data-editable="meta" style="font-family:Inter,sans-serif;font-size:12.5px;color:var(--muted);">{{ meta }}</div>
    </div>
  </div>
</article>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;360px&quot;,&quot;height&quot;:&quot;260px&quot;},&quot;person&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Customer Name&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;meta&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Local Guide · Google Review&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;text&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Placeholder review text — replace with a real Google review.&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;rating&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:5,&quot;min&quot;:0,&quot;max&quot;:5,&quot;tsType&quot;:&quot;number&quot;}}">
class Component extends DCLogic {
  constructor(p){ super(p); this.avatarRef=React.createRef(); }
  componentDidMount(){ if(this.props.tone && this.avatarRef.current) this.avatarRef.current.style.background=this.props.tone; }
  renderVals(){
    const r = Math.max(0, Math.min(5, Number(this.props.rating ?? 5)));
    const name = this.props.person ?? 'Customer Name';
    return {
      name,
      meta: this.props.meta ?? 'Local Guide · Google Review',
      text: this.props.text ?? 'Placeholder review text — replace with a real Google review.',
      rating: r,
      initial: (name.trim()[0] || 'H').toUpperCase(),
      stars: Array.from({length:5}, (_,i)=> i<r ? '#D9A441' : '#E4DED4'),
    };
  }
}
</script>
</body>
</html>
