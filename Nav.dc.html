<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--terracotta:#8B3A2F;--slate:#2E3A34;--gold:#D9A441;--bg:#FAF7F2;--surface:#FFFFFF;--text:#2A2621;--muted:#6B6259;--btn-hover:#6E2E25;}
*{box-sizing:border-box;}
body{margin:0;}
.hh-desktop-nav{display:flex;}
.hh-hamburger{display:none;}
@media(max-width:920px){.hh-desktop-nav{display:none;}.hh-hamburger{display:inline-flex;}.hh-navcta{display:none;}}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}
</style>
</helmet>
<sc-if value="{{ showAnnouncement }}" hint-placeholder-val="{{ false }}">
  <div style="background:var(--slate);color:#F3EEE6;font-family:Inter,sans-serif;font-size:13.5px;letter-spacing:.01em;text-align:center;padding:9px 16px;">
    <span data-editable="announcement">{{ announcementText }}</span>
  </div>
</sc-if>
<header ref="{{ headerRef }}" style="position:sticky;top:0;z-index:100;background:rgba(250,247,242,.92);backdrop-filter:saturate(140%) blur(10px);border-bottom:1px solid rgba(42,38,33,.08);transition:padding .28s ease, box-shadow .28s ease;padding:16px 0;">
  <div style="max-width:1240px;margin:0 auto;padding:0 clamp(18px,4vw,40px);display:flex;align-items:center;justify-content:space-between;gap:20px;">
    <a href="Home.dc.html" aria-label="Heera Homes home" style="display:flex;align-items:center;gap:12px;text-decoration:none;">
      <span ref="{{ logoRef }}" style="display:inline-flex;transition:transform .28s ease;">
        <svg width="38" height="38" viewBox="0 0 34 34" role="img" aria-hidden="true" fill="none">
          <rect x="0" y="0" width="9" height="9" rx="2.4" fill="#8B3A2F"/>
          <rect x="0" y="12.5" width="9" height="9" rx="2.4" fill="#8B3A2F"/>
          <rect x="0" y="25" width="9" height="9" rx="2.4" fill="#8B3A2F"/>
          <rect x="12.5" y="12.5" width="9" height="9" rx="2.4" fill="#D9A441"/>
          <rect x="25" y="0" width="9" height="9" rx="2.4" fill="#8B3A2F"/>
          <rect x="25" y="12.5" width="9" height="9" rx="2.4" fill="#8B3A2F"/>
          <rect x="25" y="25" width="9" height="9" rx="2.4" fill="#8B3A2F"/>
        </svg>
      </span>
      <span style="display:flex;flex-direction:column;line-height:1;">
        <span style="font-family:Fraunces,serif;font-weight:600;font-size:20px;color:var(--terracotta);letter-spacing:.01em;">HEERA HOMES</span>
        <span style="font-family:Inter,sans-serif;font-weight:500;font-size:10.5px;letter-spacing:.22em;color:var(--muted);margin-top:4px;text-transform:uppercase;">Tiles &amp; Sanitary</span>
      </span>
    </a>

    <nav class="hh-desktop-nav" aria-label="Primary" style="align-items:center;gap:6px;">
      <a data-navlink href="Home.dc.html" style="font-family:Inter,sans-serif;font-size:15px;font-weight:500;color:var(--text);text-decoration:none;padding:8px 13px;border-radius:8px;transition:color .2s,background .2s;">Home</a>
      <a data-navlink href="About.dc.html" style="font-family:Inter,sans-serif;font-size:15px;font-weight:500;color:var(--text);text-decoration:none;padding:8px 13px;border-radius:8px;transition:color .2s,background .2s;">About</a>
      <a data-navlink href="Products.dc.html" style="font-family:Inter,sans-serif;font-size:15px;font-weight:500;color:var(--text);text-decoration:none;padding:8px 13px;border-radius:8px;transition:color .2s,background .2s;">Products</a>
      <a data-navlink href="Gallery.dc.html" style="font-family:Inter,sans-serif;font-size:15px;font-weight:500;color:var(--text);text-decoration:none;padding:8px 13px;border-radius:8px;transition:color .2s,background .2s;">Gallery</a>
      <a data-navlink href="Reviews.dc.html" style="font-family:Inter,sans-serif;font-size:15px;font-weight:500;color:var(--text);text-decoration:none;padding:8px 13px;border-radius:8px;transition:color .2s,background .2s;">Reviews</a>
      <a data-navlink href="Contact.dc.html" style="font-family:Inter,sans-serif;font-size:15px;font-weight:500;color:var(--text);text-decoration:none;padding:8px 13px;border-radius:8px;transition:color .2s,background .2s;">Contact</a>
    </nav>

    <div style="display:flex;align-items:center;gap:10px;">
      <a class="hh-navcta" href="tel:{{ phone }}" style="display:inline-flex;align-items:center;gap:8px;background:var(--terracotta);color:#fff;font-family:Inter,sans-serif;font-weight:600;font-size:14.5px;text-decoration:none;padding:11px 18px;border-radius:100px;transition:transform .18s ease,background .2s ease;" onMouseEnter="{{ onCtaEnter }}" onMouseLeave="{{ onCtaLeave }}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        <span data-editable="phone">{{ phoneDisplay }}</span>
      </a>
      <button class="hh-hamburger" aria-label="Open menu" onClick="{{ toggleMenu }}" style="align-items:center;justify-content:center;width:46px;height:46px;background:var(--surface);border:1px solid rgba(42,38,33,.12);border-radius:12px;cursor:pointer;color:var(--slate);">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
  </div>
</header>

<div ref="{{ backdropRef }}" onClick="{{ closeMenu }}" style="position:fixed;inset:0;z-index:200;background:rgba(20,16,12,.5);opacity:0;pointer-events:none;transition:opacity .3s ease;"></div>
<aside ref="{{ menuRef }}" aria-label="Mobile menu" style="position:fixed;top:0;right:0;bottom:0;z-index:201;width:min(340px,86vw);background:var(--bg);box-shadow:-18px 0 50px rgba(20,16,12,.22);transform:translateX(105%);transition:transform .34s cubic-bezier(.4,0,.15,1);display:flex;flex-direction:column;padding:24px;">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
    <span style="font-family:Fraunces,serif;font-weight:600;font-size:18px;color:var(--terracotta);">HEERA HOMES</span>
    <button aria-label="Close menu" onClick="{{ closeMenu }}" style="width:42px;height:42px;background:var(--surface);border:1px solid rgba(42,38,33,.12);border-radius:11px;cursor:pointer;color:var(--slate);display:inline-flex;align-items:center;justify-content:center;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <nav aria-label="Mobile" style="display:flex;flex-direction:column;gap:2px;margin-top:6px;">
    <a data-mlink href="Home.dc.html" style="font-family:Fraunces,serif;font-size:22px;font-weight:500;color:var(--text);text-decoration:none;padding:13px 6px;border-bottom:1px solid rgba(42,38,33,.07);opacity:0;transform:translateX(18px);transition:opacity .3s ease,transform .3s ease;">Home</a>
    <a data-mlink href="About.dc.html" style="font-family:Fraunces,serif;font-size:22px;font-weight:500;color:var(--text);text-decoration:none;padding:13px 6px;border-bottom:1px solid rgba(42,38,33,.07);opacity:0;transform:translateX(18px);transition:opacity .3s ease,transform .3s ease;">About</a>
    <a data-mlink href="Products.dc.html" style="font-family:Fraunces,serif;font-size:22px;font-weight:500;color:var(--text);text-decoration:none;padding:13px 6px;border-bottom:1px solid rgba(42,38,33,.07);opacity:0;transform:translateX(18px);transition:opacity .3s ease,transform .3s ease;">Products</a>
    <a data-mlink href="Gallery.dc.html" style="font-family:Fraunces,serif;font-size:22px;font-weight:500;color:var(--text);text-decoration:none;padding:13px 6px;border-bottom:1px solid rgba(42,38,33,.07);opacity:0;transform:translateX(18px);transition:opacity .3s ease,transform .3s ease;">Gallery</a>
    <a data-mlink href="Reviews.dc.html" style="font-family:Fraunces,serif;font-size:22px;font-weight:500;color:var(--text);text-decoration:none;padding:13px 6px;border-bottom:1px solid rgba(42,38,33,.07);opacity:0;transform:translateX(18px);transition:opacity .3s ease,transform .3s ease;">Reviews</a>
    <a data-mlink href="FAQ.dc.html" style="font-family:Fraunces,serif;font-size:22px;font-weight:500;color:var(--text);text-decoration:none;padding:13px 6px;border-bottom:1px solid rgba(42,38,33,.07);opacity:0;transform:translateX(18px);transition:opacity .3s ease,transform .3s ease;">FAQ</a>
    <a data-mlink href="Contact.dc.html" style="font-family:Fraunces,serif;font-size:22px;font-weight:500;color:var(--text);text-decoration:none;padding:13px 6px;opacity:0;transform:translateX(18px);transition:opacity .3s ease,transform .3s ease;">Contact</a>
  </nav>
  <div style="margin-top:auto;display:flex;flex-direction:column;gap:10px;padding-top:20px;">
    <a href="tel:{{ phone }}" style="display:inline-flex;align-items:center;justify-content:center;gap:9px;background:var(--terracotta);color:#fff;font-family:Inter,sans-serif;font-weight:600;font-size:16px;text-decoration:none;padding:14px;border-radius:100px;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      Call Us Now
    </a>
    <a href="https://wa.me/{{ whatsappNumber }}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;justify-content:center;gap:9px;background:#fff;color:var(--slate);border:1.5px solid rgba(46,58,52,.22);font-family:Inter,sans-serif;font-weight:600;font-size:16px;text-decoration:none;padding:13px;border-radius:100px;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="#25D366"><path d="M17.5 14.4c-.3-.15-1.77-.87-2.04-.97-.27-.1-.47-.15-.67.15-.2.3-.77.97-.94 1.17-.17.2-.35.22-.65.07-.3-.15-1.26-.46-2.4-1.48-.9-.8-1.5-1.77-1.67-2.07-.17-.3-.02-.46.13-.6.13-.13.3-.35.45-.52.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.08-.15-.67-1.62-.92-2.22-.24-.58-.49-.5-.67-.51h-.57c-.2 0-.52.07-.8.37-.27.3-1.04 1.02-1.04 2.49s1.07 2.89 1.22 3.09c.15.2 2.1 3.2 5.08 4.49.71.3 1.26.49 1.69.63.71.22 1.36.19 1.87.12.57-.09 1.77-.72 2.02-1.42.25-.7.25-1.29.17-1.42-.07-.13-.27-.2-.57-.35zM12 2a10 10 0 0 0-8.55 15.13L2 22l4.98-1.32A10 10 0 1 0 12 2z"/></svg>
      Chat on WhatsApp
    </a>
  </div>
</aside>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;80px&quot;},&quot;phone&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;+919876543210&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Contact&quot;},&quot;phoneDisplay&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;+91 98765 43210&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Contact&quot;},&quot;whatsappNumber&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;919876543210&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Contact&quot;},&quot;showAnnouncement&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Announcement&quot;},&quot;announcementText&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Now stocking the new season floor-tile collection — visit our showroom to view samples.&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Announcement&quot;}}">
class Component extends DCLogic {
  constructor(p){
    super(p);
    this.headerRef = React.createRef();
    this.logoRef = React.createRef();
    this.menuRef = React.createRef();
    this.backdropRef = React.createRef();
    this._open = false;
    this._onScroll = this._onScroll.bind(this);
  }
  componentDidMount(){
    window.addEventListener('scroll', this._onScroll, {passive:true});
    this._onScroll();
    // active link
    const here = (location.pathname.split('/').pop() || 'Home.dc.html').toLowerCase();
    document.querySelectorAll('[data-navlink]').forEach(a=>{
      const t = (a.getAttribute('href')||'').toLowerCase();
      if(t===here || (here==='' && t==='home.dc.html')){
        a.style.color='var(--terracotta)';
        a.style.background='rgba(139,58,47,.08)';
      }
    });
  }
  componentWillUnmount(){ window.removeEventListener('scroll', this._onScroll); }
  _onScroll(){
    const h=this.headerRef.current, l=this.logoRef.current;
    if(!h) return;
    if(window.scrollY>14){ h.style.padding='9px 0'; h.style.boxShadow='0 6px 24px rgba(42,38,33,.08)'; if(l) l.style.transform='scale(.9)'; }
    else { h.style.padding='16px 0'; h.style.boxShadow='none'; if(l) l.style.transform='none'; }
  }
  _setOpen(v){
    this._open=v;
    const m=this.menuRef.current, b=this.backdropRef.current;
    if(m) m.style.transform = v ? 'none' : 'translateX(105%)';
    if(b){ b.style.opacity = v ? '1':'0'; b.style.pointerEvents = v ? 'auto':'none'; }
    document.body.style.overflow = v ? 'hidden' : '';
    if(m){
      const links=m.querySelectorAll('[data-mlink]');
      links.forEach((el,i)=>{
        if(v){ el.style.transitionDelay=(0.06+i*0.05)+'s'; el.style.opacity='1'; el.style.transform='translateX(0)'; }
        else { el.style.transitionDelay='0s'; el.style.opacity='0'; el.style.transform='translateX(18px)'; }
      });
    }
  }
  renderVals(){
    return {
      phone: this.props.phone ?? '+919876543210',
      phoneDisplay: this.props.phoneDisplay ?? '+91 98765 43210',
      whatsappNumber: this.props.whatsappNumber ?? '919876543210',
      showAnnouncement: this.props.showAnnouncement ?? false,
      announcementText: this.props.announcementText ?? 'Now stocking the new season floor-tile collection — visit our showroom to view samples.',
      toggleMenu: ()=> this._setOpen(!this._open),
      closeMenu: ()=> this._setOpen(false),
      headerRef: this.headerRef, logoRef: this.logoRef, menuRef: this.menuRef, backdropRef: this.backdropRef,
      onCtaEnter: (e)=>{ e.currentTarget.style.background='var(--btn-hover)'; e.currentTarget.style.transform='scale(1.04)'; },
      onCtaLeave: (e)=>{ e.currentTarget.style.background='var(--terracotta)'; e.currentTarget.style.transform='none'; },
    };
  }
}
</script>
</body>
</html>
