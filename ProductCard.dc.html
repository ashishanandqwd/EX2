<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>:root{--terracotta:#8B3A2F;--slate:#2E3A34;--gold:#D9A441;--bg:#FAF7F2;--surface:#FFFFFF;--text:#2A2621;--muted:#6B6259;}*{box-sizing:border-box;}@media(prefers-reduced-motion:reduce){*{transition:none!important;}}</style>
</helmet>
<article ref="{{ cardRef }}" style="background:var(--surface);border:1px solid rgba(42,38,33,.07);border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(42,38,33,.04);transition:transform .3s ease,box-shadow .3s ease;display:flex;flex-direction:column;height:100%;" onMouseEnter="{{ enter }}" onMouseLeave="{{ leave }}">
  <div ref="{{ imgRef }}" role="img" aria-label="{{ alt }}" style="aspect-ratio:1/1;position:relative;background:linear-gradient(135deg,#EAE0D2,#D9C8B4);overflow:hidden;">
    <div style="position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.22) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.22) 1px,transparent 1px);background-size:28px 28px;"></div>
  </div>
  <div style="padding:16px 16px 18px;display:flex;flex-direction:column;gap:6px;flex:1;">
    <h3 data-editable="name" style="margin:0;font-family:Fraunces,serif;font-weight:600;font-size:17px;color:var(--text);line-height:1.25;">{{ name }}</h3>
    <p data-editable="spec" style="margin:0;font-family:Inter,sans-serif;font-size:13px;line-height:1.5;color:var(--muted);flex:1;">{{ spec }}</p>
    <a href="{{ waLink }}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;justify-content:center;gap:7px;margin-top:8px;font-family:Inter,sans-serif;font-weight:600;font-size:13px;color:var(--terracotta);text-decoration:none;padding:9px;border:1px solid rgba(139,58,47,.25);border-radius:100px;transition:background .2s,color .2s;" onMouseEnter="{{ btnEnter }}" onMouseLeave="{{ btnLeave }}">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 14.4c-.3-.15-1.77-.87-2.04-.97-.27-.1-.47-.15-.67.15-.2.3-.77.97-.94 1.17-.17.2-.35.22-.65.07-.3-.15-1.26-.46-2.4-1.48-.9-.8-1.5-1.77-1.67-2.07-.17-.3-.02-.46.13-.6.13-.13.3-.35.45-.52.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.08-.15-.67-1.62-.92-2.22-.24-.58-.49-.5-.67-.51h-.57c-.2 0-.52.07-.8.37-.27.3-1.04 1.02-1.04 2.49s1.07 2.89 1.22 3.09c.15.2 2.1 3.2 5.08 4.49 2.02.87 2.02.58 2.39.55.37-.04 1.2-.49 1.37-.96.17-.47.17-.87.12-.96z"/></svg>
      Ask About This
    </a>
  </div>
</article>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;240px&quot;,&quot;height&quot;:&quot;330px&quot;},&quot;nameProd&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Product name&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;spec&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Size / finish placeholder — editable.&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;whatsappNumber&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;919876543210&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  constructor(p){ super(p); this.cardRef=React.createRef(); this.imgRef=React.createRef(); }
  componentDidMount(){ if(this.props.tone && this.imgRef.current) this.imgRef.current.style.background=this.props.tone; }
  renderVals(){
    const name = this.props.nameProd ?? 'Product name';
    const wnum = this.props.whatsappNumber ?? '919876543210';
    return {
      name,
      spec: this.props.spec ?? 'Size / finish placeholder — editable.',
      alt: this.props.alt ?? ('Placeholder photo of ' + name.toLowerCase()),
      cardRef:this.cardRef, imgRef:this.imgRef,
      waLink: 'https://wa.me/'+wnum+'?text='+encodeURIComponent('Hi Heera Homes, I would like details and pricing for: '+name+'.'),
      enter:(e)=>{ e.currentTarget.style.transform='translateY(-5px)'; e.currentTarget.style.boxShadow='0 14px 32px rgba(42,38,33,.12)'; },
      leave:(e)=>{ e.currentTarget.style.transform='none'; e.currentTarget.style.boxShadow='0 2px 8px rgba(42,38,33,.04)'; },
      btnEnter:(e)=>{ e.currentTarget.style.background='var(--terracotta)'; e.currentTarget.style.color='#fff'; },
      btnLeave:(e)=>{ e.currentTarget.style.background='transparent'; e.currentTarget.style.color='var(--terracotta)'; },
    };
  }
}
</script>
</body>
</html>
