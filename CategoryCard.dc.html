<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>:root{--terracotta:#8B3A2F;--slate:#2E3A34;--gold:#D9A441;--bg:#FAF7F2;--surface:#FFFFFF;--text:#2A2621;--muted:#6B6259;--btn-hover:#6E2E25;}*{box-sizing:border-box;}@media(prefers-reduced-motion:reduce){*{transition:none!important;}}</style>
</helmet>
<article ref="{{ cardRef }}" style="background:var(--surface);border:1px solid rgba(42,38,33,.07);border-radius:16px;overflow:hidden;box-shadow:0 2px 10px rgba(42,38,33,.04);transition:transform .3s ease,box-shadow .3s ease;display:flex;flex-direction:column;height:100%;" onMouseEnter="{{ enter }}" onMouseLeave="{{ leave }}">
  <div ref="{{ imgRef }}" role="img" aria-label="{{ alt }}" style="aspect-ratio:4/3;position:relative;background:linear-gradient(135deg,#E9DED0,#D6C4B0);overflow:hidden;">
    <div style="position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.22) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.22) 1px,transparent 1px);background-size:36px 36px;"></div>
    <span style="position:absolute;left:12px;bottom:10px;font-family:Inter,sans-serif;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:rgba(42,38,33,.55);background:rgba(255,255,255,.78);padding:4px 8px;border-radius:6px;">Sample image</span>
  </div>
  <div style="padding:22px;display:flex;flex-direction:column;gap:10px;flex:1;">
    <h3 data-editable="title" style="margin:0;font-family:Fraunces,serif;font-weight:600;font-size:22px;color:var(--text);">{{ title }}</h3>
    <p data-editable="blurb" style="margin:0;font-family:Inter,sans-serif;font-size:14.5px;line-height:1.6;color:var(--muted);flex:1;">{{ blurb }}</p>
    <div style="display:flex;align-items:center;gap:14px;margin-top:8px;flex-wrap:wrap;">
      <a href="{{ href }}" style="display:inline-flex;align-items:center;gap:6px;font-family:Inter,sans-serif;font-weight:600;font-size:14.5px;color:var(--terracotta);text-decoration:none;">
        View Full Range
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </a>
      <a href="{{ waLink }}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;font-family:Inter,sans-serif;font-weight:500;font-size:13.5px;color:var(--slate);text-decoration:none;padding:6px 12px;border:1px solid rgba(46,58,52,.2);border-radius:100px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="#128C4B"><path d="M17.5 14.4c-.3-.15-1.77-.87-2.04-.97-.27-.1-.47-.15-.67.15-.2.3-.77.97-.94 1.17-.17.2-.35.22-.65.07-.3-.15-1.26-.46-2.4-1.48-.9-.8-1.5-1.77-1.67-2.07-.17-.3-.02-.46.13-.6.13-.13.3-.35.45-.52.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.08-.15-.67-1.62-.92-2.22-.24-.58-.49-.5-.67-.51h-.57c-.2 0-.52.07-.8.37-.27.3-1.04 1.02-1.04 2.49s1.07 2.89 1.22 3.09c.15.2 2.1 3.2 5.08 4.49 2.02.87 2.02.58 2.39.55.37-.04 1.2-.49 1.37-.96.17-.47.17-.87.12-.96z"/></svg>
        Ask About This
      </a>
    </div>
  </div>
</article>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;320px&quot;,&quot;height&quot;:&quot;400px&quot;},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Category&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;blurb&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Short description of this category and what it covers.&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;href&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Products.dc.html&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;whatsappNumber&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;919876543210&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  constructor(p){ super(p); this.cardRef=React.createRef(); this.imgRef=React.createRef(); }
  componentDidMount(){ if(this.props.tone && this.imgRef.current) this.imgRef.current.style.background=this.props.tone; }
  renderVals(){
    const title = this.props.title ?? 'Category';
    const wnum = this.props.whatsappNumber ?? '919876543210';
    return {
      title,
      blurb: this.props.blurb ?? 'Short description of this category and what it covers.',
      alt: this.props.alt ?? ('Placeholder photo of ' + title.toLowerCase()),
      href: this.props.href ?? 'Products.dc.html',
      cardRef:this.cardRef, imgRef:this.imgRef,
      waLink: 'https://wa.me/'+wnum+'?text='+encodeURIComponent('Hi Heera Homes, I would like to ask about your '+title+' range.'),
      enter:(e)=>{ e.currentTarget.style.transform='translateY(-6px)'; e.currentTarget.style.boxShadow='0 18px 40px rgba(42,38,33,.12)'; },
      leave:(e)=>{ e.currentTarget.style.transform='none'; e.currentTarget.style.boxShadow='0 2px 10px rgba(42,38,33,.04)'; },
    };
  }
}
</script>
</body>
</html>
